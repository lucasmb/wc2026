name: Deploy SPA to VPS

on:
  push:
    branches:
      - main # Change to your production branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install and Build Frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm exec quasar build

      - name: Copy files to VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          # Quasar outputs SPA builds to dist/spa by default
          source: "frontend/dist/spa/*"
          target: ${{ secrets.VPS_SSH_PORT }}
          strip_components: 3 # Removes 'frontend/dist/spa' from the target path
